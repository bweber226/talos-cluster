global:
  domain: argocd.webernet.me

configs:
  params:
    server.insecure: "true"
  cm:
    url: http://argocd.webernet.me

server:
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: 192.168.0.222
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.webernet.me
