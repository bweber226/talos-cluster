apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-scrobbler
  namespace: music
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-scrobbler
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: multi-scrobbler
    spec:
      containers:
        - name: multi-scrobbler
          image: ghcr.io/foxxmd/multi-scrobbler:latest
          ports:
            - containerPort: 9078
          env:
            - name: TZ
              value: America/Chicago
            - name: LASTFM_REDIRECT_URI
              value: http://scrobbler.webernet.me/lastfm/callback
          envFrom:
            - secretRef:
                name: multi-scrobbler-secret
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: multi-scrobbler-config
