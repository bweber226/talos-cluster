apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    base-url: "https://ntfy.webernet.me"
    upstream-base-url: "https://ntfy.sh"
    cache-file: /var/lib/ntfy/cache.db
    auth-file: /var/lib/ntfy/auth.db
    auth-default-access: "deny-all"
    enable-signup: false
