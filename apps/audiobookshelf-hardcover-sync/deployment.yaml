apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf-hardcover-sync
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf-hardcover-sync
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: audiobookshelf-hardcover-sync
    spec:
      containers:
        - name: audiobookshelf-hardcover-sync
          image: ghcr.io/drallgood/audiobookshelf-hardcover-sync:latest
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: America/Chicago
            - name: AUDIOBOOKSHELF_URL
              value: http://audiobookshelf.media.svc.cluster.local
            - name: SYNC_INTERVAL
              value: 1h
            - name: ENABLE_WEB_UI
              value: "true"
            - name: AUTH_ENABLED
              value: "true"
            - name: CONFIG_PATH
              value: /app/config/config.yaml
            - name: DATA_DIR
              value: /data
            - name: DATABASE_PATH
              value: /data/db/audiobookshelf-hardcover-sync.db
            - name: CACHE_DIR
              value: /data/cache
            - name: MISMATCH_OUTPUT_DIR
              value: /data/mismatches
            - name: SYNC_STATE_FILE
              value: /data/sync_state.json
          envFrom:
            - secretRef:
                name: audiobookshelf-hardcover-sync-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /app/config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: audiobookshelf-hardcover-sync-data
        - name: config
          configMap:
            name: audiobookshelf-hardcover-sync-config
